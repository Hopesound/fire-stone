<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Fire Stone | 문화유산 화재위험 관제 초안</title>
    <link rel="preconnect" href="https://unpkg.com">
    <link rel="preconnect" href="https://tile.openstreetmap.org">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">NASA FIRMS + 문화유산 화재위험 관제</p>
        <h1>Fire Stone</h1>
      </div>
      <div class="header-metrics" aria-label="선택 기간 요약">
        <div>
          <span id="metricDetections">0</span>
          <small>감지 지점</small>
        </div>
        <div>
          <span id="metricHotspotArea">0 km²</span>
          <small>핫스팟 면적</small>
        </div>
        <div>
          <span id="metricAtRisk">0</span>
          <small>인근 이력 문화유산</small>
        </div>
      </div>
    </header>

    <main class="app-shell">
      <aside class="control-panel" aria-label="지도와 데이터 필터">
        <section class="panel-section">
          <h2>데이터 조건</h2>
          <label class="field">
            <span>종료일</span>
            <input id="endDate" type="date">
          </label>
          <div class="field">
            <span>누적 단위</span>
            <div class="segmented" role="group" aria-label="누적 기간">
              <button class="segment is-active" type="button" data-range="7">1주</button>
              <button class="segment" type="button" data-range="14">2주</button>
            </div>
          </div>
          <label class="field">
            <span>FIRMS 센서</span>
            <select id="sourceSelect">
              <option value="VIIRS_SNPP_NRT">VIIRS S-NPP NRT</option>
              <option value="VIIRS_NOAA20_NRT">VIIRS NOAA-20 NRT</option>
              <option value="VIIRS_NOAA21_NRT">VIIRS NOAA-21 NRT</option>
              <option value="MODIS_NRT">MODIS NRT</option>
            </select>
          </label>
          <label class="field">
            <span>최소 신뢰도 <strong id="confidenceValue">50</strong></span>
            <input id="confidenceRange" type="range" min="0" max="100" step="5" value="50">
          </label>
          <label class="field">
            <span>문화유산 주변 반경 <strong id="radiusValue">10 km</strong></span>
            <input id="radiusRange" type="range" min="2" max="30" step="1" value="10">
          </label>
        </section>

        <section class="panel-section">
          <h2>문화유산 유형</h2>
          <label class="check-row">
            <input type="checkbox" value="temple" checked>
            <span class="legend-dot temple"></span>
            <span>사찰</span>
          </label>
          <label class="check-row">
            <input type="checkbox" value="heritage" checked>
            <span class="legend-dot heritage"></span>
            <span>문화유산</span>
          </label>
          <label class="check-row">
            <input type="checkbox" value="house" checked>
            <span class="legend-dot house"></span>
            <span>고택·마을</span>
          </label>
        </section>

        <section class="panel-section">
          <h2>실데이터 연결</h2>
          <label class="field">
            <span>FIRMS MAP_KEY</span>
            <input id="mapKey" type="password" autocomplete="off" placeholder="샘플 검토 후 입력">
          </label>
          <div class="action-row">
            <button id="loadSample" class="icon-button" type="button" title="샘플 데이터로 보기" aria-label="샘플 데이터로 보기">
              <span aria-hidden="true">S</span>
            </button>
            <button id="loadFirms" class="primary-button" type="button">FIRMS 불러오기</button>
          </div>
          <p id="dataStatus" class="status-text" role="status">샘플 데이터가 표시됩니다.</p>
        </section>
      </aside>

      <section class="map-workspace" aria-label="지도 관제 영역">
        <div id="map" class="map-canvas"></div>
        <div class="map-overlay">
          <div class="overlay-item">
            <span class="swatch fire"></span>
            <span>감지 지점</span>
          </div>
          <div class="overlay-item">
            <span class="swatch area"></span>
            <span>핫스팟 면적</span>
          </div>
          <div class="overlay-item">
            <span class="swatch radius"></span>
            <span>관리 반경</span>
          </div>
        </div>
      </section>

      <section class="analytics-band" aria-label="일별 누적 분석">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Daily cumulative view</p>
            <h2>일별 감지와 누적 추이</h2>
          </div>
          <button id="exportCsv" class="secondary-button" type="button">CSV 내보내기</button>
        </div>
        <div id="dailyChart" class="daily-chart" aria-label="일별 감지 수와 누적 수 차트"></div>
      </section>

      <section class="heritage-band" aria-label="문화유산별 화재 이력 관리">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Heritage risk management</p>
            <h2>문화유산 인근 화재 이력</h2>
          </div>
          <div class="risk-filter" role="group" aria-label="위험도 필터">
            <button class="risk-chip is-active" type="button" data-risk="all">전체</button>
            <button class="risk-chip" type="button" data-risk="high">높음</button>
            <button class="risk-chip" type="button" data-risk="medium">주의</button>
            <button class="risk-chip" type="button" data-risk="low">낮음</button>
          </div>
        </div>
        <div class="management-grid">
          <div id="heritageList" class="heritage-list"></div>
          <article class="detail-panel" aria-live="polite">
            <div id="detailEmpty" class="empty-state">지도나 목록에서 문화유산을 선택하세요.</div>
            <div id="detailContent" class="detail-content is-hidden">
              <div class="detail-topline">
                <div>
                  <p id="detailRegion" class="eyebrow"></p>
                  <h3 id="detailName"></h3>
                </div>
                <span id="detailRisk" class="risk-badge"></span>
              </div>
              <div class="detail-stats">
                <div>
                  <span id="detailCount">0</span>
                  <small>반경 내 감지</small>
                </div>
                <div>
                  <span id="detailLast">-</span>
                  <small>최근 감지일</small>
                </div>
                <div>
                  <span id="detailDistance">-</span>
                  <small>최단 거리</small>
                </div>
              </div>
              <label class="field">
                <span>관리 상태</span>
                <select id="managementStatus">
                  <option value="확인 필요">확인 필요</option>
                  <option value="현장 점검 중">현장 점검 중</option>
                  <option value="조치 완료">조치 완료</option>
                  <option value="모니터링">모니터링</option>
                </select>
              </label>
              <label class="field">
                <span>관리 메모</span>
                <textarea id="managementNote" rows="4" placeholder="점검자, 조치 내용, 다음 확인일을 기록"></textarea>
              </label>
              <button id="saveManagement" class="primary-button" type="button">저장</button>
              <div>
                <h4>기간 내 이력</h4>
                <div id="historyTimeline" class="timeline"></div>
              </div>
            </div>
          </article>
        </div>
      </section>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
  </body>
</html>
