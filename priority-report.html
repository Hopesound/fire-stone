<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Fire Stone | 재난 예방 우선순위 보고서</title>
    <link rel="stylesheet" href="styles.css?v=steep-slope-map-v7">
  </head>
  <body class="route-page" data-page="report">
    <header class="app-header">
      <div class="header-main">
        <p class="eyebrow">NASA FIRMS + Heritage Risk Analysis</p>
        <h1>Fire Stone</h1>
      </div>
      <div class="header-dashboard">
        <div class="header-metrics" aria-label="선택 기간 분석 요약">
          <div><span id="metricDetections">0</span><small>활성화재픽셀</small></div>
          <div><span id="metricRiskScore">0.0</span><small>가중위험점수</small></div>
          <div><span id="metricAtRisk">0</span><small>위험문화유산</small></div>
          <div><span id="metricAlerts">0</span><small>알림후보</small></div>
        </div>
        <nav class="app-nav" aria-label="분석 페이지">
          <a class="nav-link" href="index.html" data-page="map" data-route="page">MAP</a>
          <a class="nav-link" href="risk-score.html" data-page="daily" data-route="page">위험점수</a>
          <a class="nav-link is-active" href="priority-report.html" data-page="report" data-route="page">순위보고서</a>
          <a class="nav-link" href="heritage-risk.html" data-page="heritage" data-route="page">위험도</a>
        </nav>
      </div>
    </header>

    <main class="app-shell">
      <aside class="control-panel" aria-label="데이터와 위험도 조건">
        <section class="panel-section">
          <h2>데이터 조건</h2>
          <label class="field"><span>분석 종료일</span><input id="endDate" type="date"></label>
          <div class="field">
            <span>누적 기간</span>
            <div class="segmented" role="group" aria-label="누적 기간">
              <button class="segment is-active" type="button" data-range="7">주</button>
              <button class="segment" type="button" data-range="30">월</button>
              <button class="segment" type="button" data-range="365">년</button>
            </div>
          </div>
          <label class="field">
            <span>FIRMS 센서</span>
            <select id="sourceSelect">
              <option value="VIIRS_SNPP_NRT">VIIRS S-NPP NRT</option>
              <option value="VIIRS_NOAA20_NRT">VIIRS NOAA-20 NRT</option>
              <option value="VIIRS_NOAA21_NRT">VIIRS NOAA-21 NRT</option>
              <option value="MODIS_NRT">MODIS NRT</option>
            </select>
          </label>
          <label class="field"><span>최소 신뢰도 <strong id="confidenceValue">70</strong></span><input id="confidenceRange" type="range" min="0" max="100" step="5" value="70"></label>
          <label class="field"><span>분석 반경 <strong id="radiusValue">10 km</strong></span><input id="radiusRange" type="range" min="2" max="30" step="1" value="10"></label>
        </section>
        <section class="panel-section">
          <h2>위험도 기준</h2>
          <div class="threshold-grid">
            <label class="field"><span>주의 기준</span><input id="mediumThreshold" type="number" min="0" step="1" value="10"></label>
            <label class="field"><span>높음 기준</span><input id="highThreshold" type="number" min="1" step="1" value="50"></label>
          </div>
        </section>
        <section class="panel-section">
          <h2>문화유산 유형</h2>
          <label class="check-row"><input type="checkbox" value="temple" checked><span class="legend-dot temple"></span><span>사찰</span></label>
          <label class="check-row"><input type="checkbox" value="heritage" checked><span class="legend-dot heritage"></span><span>문화유산</span></label>
          <label class="check-row"><input type="checkbox" value="house" checked><span class="legend-dot house"></span><span>고택·마을</span></label>
        </section>
        <section class="panel-section">
          <h2>주변 환경</h2>
          <label class="check-row"><input type="checkbox" value="conifer" checked><span class="legend-dot conifer"></span><span>침엽수 리스크</span></label>
          <label class="check-row"><input type="checkbox" value="slope" checked><span class="legend-dot slope"></span><span>급경사 리스크</span></label>
          <p class="status-text">충남 급경사지 현황과 산림청 침엽수 조림면적을 위험점수에 반영합니다.</p>
        </section>
        <section class="panel-section">
          <h2>실데이터 연결</h2>
          <label class="field"><span>FIRMS MAP_KEY</span><input id="mapKey" type="password" autocomplete="off" placeholder="샘플 검토 후 입력"></label>
          <label class="field"><span>FIRMS 프록시 URL</span><input id="proxyUrl" type="url" autocomplete="off" placeholder="https://...workers.dev/"></label>
          <div class="action-row">
            <button id="loadSample" class="icon-button" type="button" title="샘플 데이터로 보기" aria-label="샘플 데이터로 보기"><span aria-hidden="true">S</span></button>
            <button id="loadFirms" class="primary-button" type="button">FIRMS 불러오기</button>
          </div>
          <p id="dataStatus" class="status-text" role="status">샘플 데이터가 표시됩니다.</p>
        </section>
      </aside>

      <section id="page-report" class="page-view report-band is-active" data-page="report" aria-label="재난 예방 우선순위 보고서">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Decision report</p>
            <h2>재난 예방 우선순위 보고서</h2>
          </div>
          <div class="report-actions">
            <button id="exportReportCsv" class="secondary-button" type="button">보고서 CSV</button>
            <button id="exportReportJson" class="secondary-button" type="button">보고서 JSON</button>
          </div>
        </div>
        <div id="reportSummary" class="report-summary"></div>
        <div class="report-grid">
          <div class="report-table-wrap">
            <table class="report-table">
              <thead>
                <tr>
                  <th>순위</th>
                  <th>문화유산</th>
                  <th>좌표</th>
                  <th>위험</th>
                  <th>점수</th>
                  <th>환경</th>
                  <th>최단거리</th>
                  <th>FRP</th>
                  <th>예방 판단</th>
                </tr>
              </thead>
              <tbody id="reportTable"></tbody>
            </table>
          </div>
          <aside id="reportDetail" class="report-detail"></aside>
        </div>
      </section>
    </main>

    <script type="module" src="app.js?v=steep-slope-map-v7"></script>
  </body>
</html>
